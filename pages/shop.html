<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" href="../img/iconoweb.png">
        <link rel="stylesheet" href="../css/shop.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <title>FitSync | Tienda</title>
    </head>
    <body>
        <!--MENU DE NAVEGACIÓN-->
        <header class="main-header">
            <a href="index.html" class="brand">
                <img src="../img/Recurso 2logoheader.png" alt="Logo">
            </a>

            <div class="header-right">
                <nav class="nav-menu">
                    <ul>
                        <li><a href="shop.html">Tienda</a></li>
                        <li><a href="tracker.html">Tracker</a></li>
                        <li><a href="routines.html">Rutinas</a></li>
                    </ul>
                </nav>
                <div class="header-actions">
                    <a href="#" class="btn-login">Iniciar Sesión</a>
                </div>
            </div>
            <!--FIN DE MENU DE NAVEGACIÓN-->
        <!-- GGGGGGGGGGGGGGGGGGGGGGGG -->
        <!-- THE NAVBAR MUST NOT BE TOUCHED -->
        </header>

        <!-- Contenedor Principal de la Tienda -->
        <main class="shop-container">
            <h1 class="shop-title">Nuestros Productos</h1>
            <div class="product-grid">
                
                <!-- Tarjeta de Producto 1 -->
                <article class="product-card">
                    <div class="product-image-container">
                        <!-- Etiqueta img lista para ser usada -->
                        <img src="../img/gallina.png" alt="Producto 1" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Proteína Whey 100%</h3>
                        <p class="product-price">$45.00</p>
                        <button class="add-to-cart-btn">Agregar al Carrito</button>
                    </div>
                </article>

                <!-- Tarjeta de Producto 2 -->
                <article class="product-card">
                    <div class="product-image-container">
                        <img src="../img/coca.png" alt="Producto 2" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Creatina Monohidratada</h3>
                        <p class="product-price">$25.00</p>
                        <button class="add-to-cart-btn">Agregar al Carrito</button>
                    </div>
                </article>
                
                <!-- Tarjeta de Producto 3 -->
                <article class="product-card">
                    <div class="product-image-container">
                        <img src="../img/dildo.png" alt="Producto 3" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Guante de Crossfit</h3>
                        <p class="product-price">$10.00</p>
                        <button class="add-to-cart-btn">Agregar al Carrito</button>
                    </div>
                </article>

                <!-- Tarjeta de Producto 4 -->
                <article class="product-card">
                    <div class="product-image-container">
                        <img src="" alt="Producto 4" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Pre-Entreno Explosivo</h3>
                        <p class="product-price">$35.00</p>
                        <button class="add-to-cart-btn">Agregar al Carrito</button>
                    </div>
                </article>

            </div>
        </main>

        <!-- Carrito Flotante -->
        <div class="floating-cart" id="floating-cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-counter" id="cart-counter">0</span>
        </div>

        <script src="../js/shop.js"></script>
    </body>
</html>
